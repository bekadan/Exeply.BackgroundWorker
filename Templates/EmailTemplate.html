
<!DOCTYPE html>
<html lang="tr" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="x-apple-disable-message-reformatting">
    <title>Email Template</title>

    <!--[if mso]>
    <noscript>
      <xml>
        <o:OfficeDocumentSettings>
          <o:PixelsPerInch>96</o:PixelsPerInch>
        </o:OfficeDocumentSettings>
      </xml>
    </noscript>
    <![endif]-->

    <style>
        /* Reset */
        body, table, td, a {
            -webkit-text-size-adjust: 100%;
            -ms-text-size-adjust: 100%;
        }

        table, td {
            mso-table-lspace: 0pt;
            mso-table-rspace: 0pt;
        }

        img {
            -ms-interpolation-mode: bicubic;
            border: 0;
            height: auto;
            line-height: 100%;
            outline: none;
            text-decoration: none;
        }

        /* Global */
        body {
            margin: 0 !important;
            padding: 0 !important;
            background-color: #f0f0f0;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* Responsive */
        @media screen and (max-width: 600px) {
            .email-container {
                width: 100% !important;
            }

            .fluid {
                max-width: 100% !important;
                height: auto !important;
            }

            .stack-column,
            .stack-column-center {
                display: block !important;
                width: 100% !important;
                max-width: 100% !important;
                direction: ltr !important;
            }

            .stack-column-center {
                text-align: center !important;
            }

            .center-on-narrow {
                text-align: center !important;
                display: block !important;
                margin-left: auto !important;
                margin-right: auto !important;
                float: none !important;
            }

            .btn {
                width: 100% !important;
            }
        }
    </style>
</head>

<body width="100%" style="margin: 0; padding: 0; background-color: #f0f0f0;">
    <center style="width: 100%; background-color: #f0f0f0;">

        <!-- Preheader (görünmez ön izleme metni) -->
        <div style="display: none; font-size: 1px; line-height: 1px; max-height: 0px; max-width: 0px; opacity: 0; overflow: hidden; mso-hide: all; font-family: sans-serif;">
            Burayı email önizleme metni olarak kullan — inbox'ta başlığın yanında görünür. &#8199;&#65279;&#847; &#8199;&#65279;&#847;
        </div>

        <!-- Email wrapper -->
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" align="center" width="600" style="margin: auto;" class="email-container">

            <!-- ===================== HEADER ===================== -->
            <tr>
                <td style="padding: 20px 0; text-align: center; background-color: #f0f0f0;">
                    <!-- Logo -->
                    <img src="https://via.placeholder.com/150x40/1a1a2e/ffffff?text=LOGO" width="150" height="40" alt="Logo" style="display: block; margin: auto;">
                </td>
            </tr>

            <!-- ===================== HERO ===================== -->
            <tr>
                <td style="background-color: #1a1a2e; padding: 48px 40px; text-align: center;">
                    <h1 style="margin: 0 0 16px 0; font-family: Arial, Helvetica, sans-serif; font-size: 30px; line-height: 38px; color: #ffffff; font-weight: 700;">
                        {{title}}
                    </h1>
                    <p style="margin: 0 0 28px 0; font-family: Arial, Helvetica, sans-serif; font-size: 16px; line-height: 26px; color: #a8b2d8;">
                        {{desc}}
                    </p>
                    
                </td>
            </tr>

            <!-- ===================== İÇERİK ===================== -->
            <tr>
                <td style="background-color: #ffffff; padding: 40px 40px 32px 40px;">
                    <h2 style="margin: 0 0 12px 0; font-family: Arial, Helvetica, sans-serif; font-size: 20px; line-height: 28px; color: #1a1a2e; font-weight: 700;">
                        Dear,
                    </h2>
                    <p style="margin: 0 0 16px 0; font-family: Arial, Helvetica, sans-serif; font-size: 15px; line-height: 24px; color: #444444;">
                        {{text}}
                    </p>
                    <!-- CTA Butonu -->
                    <table role="presentation" cellspacing="0" cellpadding="0" border="0" align="center" style="margin: auto;">
                        <tr>
                            <td style="border-radius: 6px; background-color: #e94560;" class="btn">
                                <a href={{href}} style="display: inline-block; padding: 14px 32px; font-family: Arial, Helvetica, sans-serif; font-size: 15px; font-weight: 700; color: #ffffff; text-decoration: none; border-radius: 6px; white-space: nowrap;">
                                    Create a New Password →
                                </a>
                            </td>
                        </tr>
                    </table>
                    <p style="margin: 0; font-family: Arial, Helvetica, sans-serif; font-size: 15px; line-height: 24px; color: #444444;">
                        {{support}}
                    </p>
                </td>
            </tr>

            <!-- ===================== AYIRICI ===================== -->
            <tr>
                <td style="background-color: #ffffff; padding: 0 40px;">
                    <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                        <tr>
                            <td style="border-top: 1px solid #e8e8e8; padding: 0;">&nbsp;</td>
                        </tr>
                    </table>
                </td>
            </tr>

            <!-- ===================== FOOTER ===================== -->
            <tr>
                <td style="background-color: #1a1a2e; padding: 32px 40px; text-align: center;">

                    <!-- Sosyal medya linkleri -->
                    <table role="presentation" cellspacing="0" cellpadding="0" border="0" align="center" style="margin: 0 auto 20px auto;">
                        <tr>
                            <td style="padding: 0 8px;">
                                <a href="https://twitter.com" style="display: inline-block; color: #a8b2d8; font-family: Arial, sans-serif; font-size: 12px; text-decoration: none; font-weight: 700;">Twitter</a>
                            </td>
                            <td style="padding: 0 8px; color: #4a4a6a; font-size: 12px; font-family: Arial, sans-serif;">|</td>
                            <td style="padding: 0 8px;">
                                <a href="https://linkedin.com" style="display: inline-block; color: #a8b2d8; font-family: Arial, sans-serif; font-size: 12px; text-decoration: none; font-weight: 700;">LinkedIn</a>
                            </td>
                            <td style="padding: 0 8px; color: #4a4a6a; font-size: 12px; font-family: Arial, sans-serif;">|</td>
                            <td style="padding: 0 8px;">
                                <a href="https://instagram.com" style="display: inline-block; color: #a8b2d8; font-family: Arial, sans-serif; font-size: 12px; text-decoration: none; font-weight: 700;">Instagram</a>
                            </td>
                        </tr>
                    </table>

                    <!-- Adres -->
                    <p style="margin: 0 0 8px 0; font-family: Arial, Helvetica, sans-serif; font-size: 12px; line-height: 18px; color: #4a4a6a;">
                        Exeply LTD, 1234 Street Rd, Suite 1234, London, United Kingdom
                    </p>
                </td>
            </tr>

        </table>
        <!-- / Email wrapper -->

    </center>
</body>
</html>

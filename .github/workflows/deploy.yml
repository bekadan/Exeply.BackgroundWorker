name: Build push to ACR and deploy to Azure Container App (Background Worker)
on:
  push:
    branches:
      - master
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
env:
  AZURE_RESOURCE_GROUP: exeply-rg
  CONTAINER_APP_NAME: exeply-emailer
  ACR_NAME: exeplyregistry
  IMAGE_NAME: exeplyproject-emailer
  DOCKERFILE_PATH: ./Exeply.BackgroundWorker/Dockerfile
  AZURE_LOCATION: westeurope
  ENV_NAME: exeply-api-env
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Debug Azure secret presence
        run: |
          echo "CLIENT_ID set? ${{ secrets.AZURE_CLIENT_ID != '' }}"
          echo "TENANT_ID set? ${{ secrets.AZURE_TENANT_ID != '' }}"
          echo "SUBSCRIPTION_ID set? ${{ secrets.AZURE_SUBSCRIPTION_ID != '' }}"
      - name: Azure login with OIDC
        uses: azure/login@v1.6.1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Log in to Azure Container Registry
        run: az acr login --name ${{ env.ACR_NAME }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build and push image to ACR
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          provenance: false
          platforms: linux/amd64
          tags: |
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
      - name: Deploy to Container App
        run: |
          ENV_EXISTS=$(az containerapp env show --name ${{ env.ENV_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query "name" -o tsv 2>/dev/null || echo "")
          if [ -z "$ENV_EXISTS" ]; then
            echo "Container App Environment bulunamadı, oluşturuluyor..."
            az containerapp env create --name ${{ env.ENV_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --location ${{ env.AZURE_LOCATION }}
          else
            echo "Environment mevcut: ${{ env.ENV_NAME }}"
          fi

          APP_EXISTS=$(az containerapp show --name ${{ env.CONTAINER_APP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --query "name" -o tsv 2>/dev/null || echo "")
          if [ -z "$APP_EXISTS" ]; then
            echo "Container App bulunamadı, oluşturuluyor..."
            az containerapp create \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
              --registry-server ${{ env.ACR_NAME }}.azurecr.io \
              --environment ${{ env.ENV_NAME }} \
              --cpu 0.5 \
              --memory 1.0Gi
          else
            echo "Container App mevcut, güncelleniyor..."
            az containerapp update --name ${{ env.CONTAINER_APP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} --image ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          fi
      - name: Show latest revisions
        run: az containerapp revision list --name ${{ env.CONTAINER_APP_NAME }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }} -o table

name: Trigger auto deployment for exeply-bg-worker

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ master ]
    paths:
    - '**'
    - '.github/workflows/exeply-bg-worker-AutoDeployTrigger-a1d479a2-3439-4e39-9fbb-1403330ddfd9.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.EXEPLYBGWORKER_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.EXEPLYBGWORKER_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.EXEPLYBGWORKER_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: exeplyregistry.azurecr.io
          registryUsername: ${{ secrets.EXEPLYBGWORKER_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.EXEPLYBGWORKER_REGISTRY_PASSWORD }}
          containerAppName: exeply-bg-worker
          resourceGroup: exeply-rg
          imageToBuild: exeplyregistry.azurecr.io/exeply-bg-worker:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


